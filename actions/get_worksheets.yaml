---
name: get_worksheets
runner_type: python-script
description: Get worksheets from iGene
enabled: true
entry_point: "igene_request.py"
parameters:
  api_key:
    description: iGene API key
    type: string
    secret: true
    default: "{{config_context.api_key}}"
    required: true
  worksheet_id:
    description: ID of the worksheet to get
    type: string
    required: false
  status:
    description: Status to filter worksheets on
    type: string
    required: false
  detail:
    description: To give details on the worksheet list
    type: boolean
    required: false
  page:
    description: Which page to show
    type: integer
    default: 1
  page_size:
    description: How many worksheets to show per page
    type: integer
    default: 20
  endpoint:
    description: Request URL
    type: string
    default: "worksheets{% if worksheet_id is not none %}/{{ worksheet_id | urlencode }}{% endif %}"
    immutable: true
    required: true
  params:
    description: Request parameters
    type: object
    default:
      page: "{% if worksheet_id is none %}{{ page }}{% endif %}"
      page_size: "{% if worksheet_id is not none %}{{ page_size }}{% endif %}"
      status: "{% if status is not none %}{{ status | urlencode }}{% endif %}"
      detail: "{% if detail is not none %}{{ detail | urlencode }}{% endif %}"
    immutable: true
    required: true
