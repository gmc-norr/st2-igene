---
name: get_worksheets
runner_type: http-request
description: Get worksheets from iGene
enabled: true
entry_point: ""
parameters:
  api_key:
    description: iGene API key
    type: string
    secret: true
    default: "{{config_context.api_key}}"
    required: true
  worksheet_id:
    description: ID of the worksheet to get
    type: string
    required: false
  status:
    description: Status to filter worksheets on
    type: string
    required: false
  detail:
    description: To give details on the worksheet list
    type: boolean
    required: false
  page:
    description: Which page to show
    type: integer
    default: 1
  page_size:
    description: How many worksheets to show per page
    type: integer
    default: 20
  method:
    description: HTTP method
    type: string
    default: GET
    immutable: true
    required: true
  headers:
    description: Header with API key.
    immutable: true
    required: true
    default:
      api-key: "{{ api_key }}"
      Content-Type: application/json
  url:
    description: Request URL
    type: string
    default: "{{ config_context.base_url }}/worksheets{% if worksheet_id is not none %}/{{ worksheet_id | urlencode }}{% endif %}\
      {% if worksheet_id is none %}?page={{ page }}&page_size={{ page_size }}\
      {% if status is not none %}&status={{ status | urlencode }}{% endif %}\
      {% if detail %}&detail={{ detail | urlencode }}{% endif %}{% endif %}"
    immutable: true
    required: true
