---
name: get_sample
runner_type: http-request
description: Get sequencing sample from iGene
enabled: true
entry_point: ""
parameters:
  api_key:
    description: iGene API key
    type: string
    secret: true
    default: "{{config_context.api_key}}"
    required: true
  sample_id:
    description: ID of the sample to get.
    type: string
    required: true
  endpoint:
    description: Request URL
    type: string
    default: "worksheets/seq_sample/{{ sample_id | urlencode }}"
    immutable: true
    required: true
