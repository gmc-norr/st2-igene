---
name: get_worksheet
runner_type: http-request
description: Get worksheets from iGene
enabled: true
entry_point: ""
parameters:
  api_key:
    description: iGene API key
    type: string
    secret: true
    default: "{{config_context.api_key}}"
    required: true
  status:
    description: status to filter worksheets on.
    type: string
    required: false
  worksheet:
    description: Get worksheet.
    type: string
    required: false
  method:
    description: HTTP method
    type: string
    default: GET
    immutable: true
    required: true
  headers:
    description: Header with API key.
    immutable: true
    required: true
    default: 
      api-key: "{{ api_key }}"
      Content-Type: application/json
  url:
    description: Request URL
    type: string
    default: "{{ config_context.base_url }}/worksheets/{% if status is not none %}?status={{ status | urlencode }}{% endif %}{% if worksheet is not none %}{{ worksheet | urlencode }}{% endif %}"
    immutable: true
    required: true
