---
name: get_panels
runner_type: python-script
description: Get panels from iGene
enabled: true
entry_point: "igene_request.py"
parameters:
  api_key:
    description: iGene API key
    type: string
    secret: true
    default: "{{config_context.api_key}}"
    required: true
  gene:
    description: Gene to filter panels on.
    type: string
    required: false
  gene_id:
    description: Gene ID to filter panels on.
    type: string
    required: false
  panel:
    description: Get genes of panels.
    type: string
    required: false
  endpoint:
    description: Request URL
    type: string
    default: "gene_panels{% if gene is not none %}?gene={{ gene | urlencode }}{% endif %}{% if gene_id is not none %}?gene_id={{ gene_id | urlencode }}{% endif %}{% if panel is not none %}/{{ panel | urlencode }}{% endif %}"
    immutable: true
    required: true
